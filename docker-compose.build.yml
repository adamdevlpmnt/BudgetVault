# ═══════════════════════════════════════════════
# BudgetVault — docker-compose BUILD LOCAL
# ═══════════════════════════════════════════════
# Utilise ce fichier si tu veux construire l'image
# toi-même depuis le code source.
#
# Usage :
#   docker compose -f docker-compose.build.yml up -d --build
# ═══════════════════════════════════════════════

services:
  budgetvault:
    build: .
    container_name: budgetvault
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-budgetvault-changez-moi-en-production}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@budgetvault.local}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
