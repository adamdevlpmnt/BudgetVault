# ═══════════════════════════════════════════════
# BudgetVault — docker-compose d'installation
# ═══════════════════════════════════════════════
# Ce fichier tire l'image pré-construite depuis
# GitHub Container Registry (ghcr.io).
# Pas besoin de cloner le repository !
#
# Installation :
#   1. Créer un dossier et y placer ce fichier
#   2. Créer un fichier .env (voir plus bas)
#   3. docker compose up -d
# ═══════════════════════════════════════════════

services:
  budgetvault:
    image: ghcr.io/adamdevlpmnt/budgetvault:latest
    container_name: budgetvault
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-budgetvault-changez-moi-en-production}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@budgetvault.local}
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.get('http://localhost:3001/api/health',{timeout:4000},res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
